name: backend-check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Classify backend check scope
        id: scope
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
            git diff --name-only "$base_sha" "$head_sha" > /tmp/backend_check_changed_files.txt
          else
            # Pushes to main should always receive the full PostgreSQL-backed backend check.
            git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" > /tmp/backend_check_changed_files.txt || true
            echo "requires_postgres=true" >> "$GITHUB_OUTPUT"
            echo "changed_files<<EOF" >> "$GITHUB_OUTPUT"
            cat /tmp/backend_check_changed_files.txt >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          requires_postgres=false
          while IFS= read -r changed_file; do
            [[ -z "$changed_file" ]] && continue
            case "$changed_file" in
              README.md|docs/*|backend/tests/test_api.py|.github/workflows/backend-check.yml)
                ;;
              *)
                requires_postgres=true
                ;;
            esac
          done < /tmp/backend_check_changed_files.txt

          echo "requires_postgres=$requires_postgres" >> "$GITHUB_OUTPUT"
          echo "changed_files<<EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/backend_check_changed_files.txt >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
      - name: Print backend check scope
        run: |
          echo "requires_postgres=${{ steps.scope.outputs.requires_postgres }}"
          printf '%s\n' "${{ steps.scope.outputs.changed_files }}"
      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt
      - name: Start PostgreSQL for full backend tests
        if: steps.scope.outputs.requires_postgres == 'true'
        run: |
          docker run \
            --detach \
            --name hk-alpha-backend-postgres \
            --env POSTGRES_USER=postgres \
            --env POSTGRES_PASSWORD=postgres \
            --env POSTGRES_DB=postgres \
            --publish 5432:5432 \
            postgres:16
          for attempt in {1..30}; do
            if docker exec hk-alpha-backend-postgres pg_isready -U postgres; then
              exit 0
            fi
            sleep 2
          done
          docker logs hk-alpha-backend-postgres
          exit 1
      - name: Run backend tests
        if: steps.scope.outputs.requires_postgres == 'true'
        env:
          HK_ALPHA_TEST_POSTGRES_DSN: postgresql://postgres:postgres@127.0.0.1:5432/hk_alpha_validation
        run: PYTHONPATH=backend pytest backend/tests
      - name: Run docs/status backend tests
        if: steps.scope.outputs.requires_postgres != 'true'
        run: PYTHONPATH=backend pytest backend/tests/test_api.py -q
      - name: Run contract validation
        run: python scripts/validate_contracts.py
